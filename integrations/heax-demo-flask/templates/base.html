<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}HEAXHub · Flask demo{% endblock %}</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #1e293b;
      --panel-2: #273549;
      --fg: #e2e8f0;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --success: #4ade80;
      --warning: #fbbf24;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
    }
    header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 1rem 1.5rem;
      background: var(--panel);
      border-bottom: 1px solid #334155;
    }
    header img { height: 32px; width: 32px; }
    header h1 {
      font-size: 1.05rem;
      font-weight: 600;
      margin: 0;
      letter-spacing: 0.02em;
    }
    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }
    .card {
      background: var(--panel);
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.25rem;
    }
    .card h2 {
      margin-top: 0;
      font-size: 1rem;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    dl { margin: 0; display: grid; grid-template-columns: max-content 1fr; gap: 0.4rem 1rem; }
    dt { color: var(--muted); }
    dd { margin: 0; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    form { display: flex; gap: 0.5rem; }
    input[type=text] {
      flex: 1;
      background: var(--panel-2);
      border: 1px solid #334155;
      border-radius: 6px;
      padding: 0.5rem 0.75rem;
      color: var(--fg);
      font-size: 0.95rem;
    }
    button {
      background: var(--accent);
      color: #082f49;
      border: 0;
      border-radius: 6px;
      padding: 0.5rem 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { filter: brightness(1.05); }
    .flash {
      padding: 0.5rem 0.75rem;
      border-radius: 6px;
      margin-bottom: 0.75rem;
      font-size: 0.9rem;
    }
    .flash.success { background: rgba(74, 222, 128, 0.15); color: var(--success); }
    .flash.warning { background: rgba(251, 191, 36, 0.15); color: var(--warning); }
    a { color: var(--accent); }
    pre {
      background: var(--panel-2);
      padding: 0.75rem;
      border-radius: 6px;
      overflow-x: auto;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <header>
    <img src="{{ url_for('static', filename='heax.svg') }}" alt="HEAXHub" />
    <h1>HEAXHub · Flask demo</h1>
  </header>
  <main>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, msg in messages %}
        <div class="flash {{ category }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
