schema_version: 2
id: laminate_analyzer_mcp
name: Laminate Analyzer MCP
version: 0.2.1
owner: cae-automation
status: beta
app_type: web_app
execution_target: linux_runner

description: |
  적층 복합재의 중립면(neutral surface)·ABD 강성·평가 지표(커플링/이방성/준등방성)를
  결정론적으로 계산하는 MCP 서버. LLM 에이전트가 직접 호출하는 계산 커널로,
  동일 입력이면 바이트 단위로 동일한 응답을 보장한다(payload_hash 추적).
  - MCP 엔드포인트: /apps/laminate_analyzer_mcp/mcp (streamable HTTP)
    에이전트 등록 예) claude mcp add --transport http laminate-analyzer <포털베이스>/apps/laminate_analyzer_mcp/mcp
  - 헬스체크: /health. 웹 UI 없음(JSON API + MCP 전용).
  - Tool 11종: analyze_laminate(원샷 진입점), validate_laminate_input, compute_abd_matrix,
    compute_neutral_axis, evaluate_laminate, get_reference_cases(폐형해 자가검증), get_server_info,
    solve_load_response(하중응답·유효상수), run_sensitivity_analysis, batch_evaluate_laminates,
    generate_design_report(ko/en).
  - 규약: laminae[0]=최하단 ply, 각도 deg CCW, unit_system 필수(SI | SI_mm).
  - materialtwin_web MCP와 연계: 실측 물성(E)을 materialtwin에서 조회해 ply 입력으로 사용
    (E_GPa→MPa ×1000, 미실측 상수는 source={"type":"assumed"}로 W120 추적).
  fastapi 스택 기본 entrypoint(uvicorn app.main:app --root-path $ROOT_PATH)를 그대로 사용하며,
  loopback 바인드 + Caddy 경계 전제로 MCP DNS-rebinding Host 검증은 비활성화되어 있다.

tags:
  - composites
  - laminate
  - clt
  - abd-matrix
  - mcp
  - llm-tools
  - cae

# type은 스키마 v2 필수(python_venv), stack은 스택 리졸버가 읽는 키 — 둘 다 선언
build:
  type: python_venv
  stack: fastapi
  python_version: "3.12"

launch:
  mode: service
  # fastapi 스택 기본 entrypoint 사용: uvicorn app.main:app --host 127.0.0.1 --port $PORT --root-path $ROOT_PATH
  health_check:
    type: http
    path: /health
  restart_policy:
    policy: on_failure
    max_attempts: 3

permissions:
  visibility: team

resources:
  cpu: 1
  memory_gb: 1
  gpu: false

# 등록 방식: GitHub 소스. HEAXHub 최신화(재스캔/재빌드) 시 main 최신 커밋을 받아 SIF 빌드.
# → 매니페스트만 HEAXHub 에 커밋되면 prod 가 git pull 로 이 등록을 받아 스스로 clone·빌드한다.
source:
  type: git
  url: https://github.com/squall321/LaminateAnalyzerMCP.git
  ref: main

# HWAX MCP Gateway 자동탐지 opt-in — HEAXHub /api/v1/mcp/servers 레지스트리에 노출되어
# 중앙 게이트웨이(:9110)가 이 앱의 MCP를 자동 흡수한다 (HEAX 서비스 PAT 중앙 주입).
mcp:
  expose: true
  path: /mcp
  transport: streamable_http
