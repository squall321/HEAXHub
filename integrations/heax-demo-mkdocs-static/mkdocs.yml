# Source configuration for the demo MkDocs site.
#
# This file is the input to `mkdocs build`. The generated output lives in
# `site/` and is what HEAXHub actually serves at runtime. This file is kept
# in the repo for reference and so the operator can rebuild locally.

site_name: MkDocs Demo
site_description: Pre-built MkDocs documentation site served by HEAXHub.
site_author: heaxhub-demo

theme:
  name: material
  palette:
    primary: blue
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy

nav:
  - Home: index.md
  - API Reference: api/index.md
  - User Guide: guide/index.md

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences

# `mkdocs build` writes the rendered site into this directory.
site_dir: site
