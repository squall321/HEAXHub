schema_version: 2
id: materialtwin_web
name: "MaterialTwin Web"
owner: "squall321"
status: stable
app_type: web_app
execution_target: linux_runner
description: "재료 물성 디지털트윈 웹 (FastAPI + Vite/React)"
build:
  stack: fastapi_react
launch:
  mode: service
  env:
    # HEAXHub 가 bind 하는 영구 볼륨(/data → var/app_data/materialtwin_web/).
    # SIF rootfs 는 read-only 라 여기 외엔 못 쓰고, 재빌드·재스캔 뒤에도 남는다.
    MATERIALTWIN_DATA_DIR: /data
  # command: <기본 entrypoint 대신 직접 지정하려면 주석 해제>
health_check:
  path: /api/health
restart_policy:
  policy: on_failure
  max_retries: 3
source:
  type: git
  # 로컬 git 참조 — push 없이 로컬 커밋을 SIF 빌드에 반영 (GitHub push 후 https URL로 복원 가능)
  url: file:///home/koopark/claude/MaterialTwinWeb
  ref: main
  # subpath: ""          # 모노레포면 하위 디렉터리 지정
permissions:
  visibility: company     # company | department | team | private

# HWAX MCP Gateway 자동탐지 opt-in (웹앱 /mcp 마운트, 삭제 툴 비노출 기본)
mcp:
  expose: true
  path: /mcp
  transport: streamable_http
