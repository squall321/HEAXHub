schema_version: 2
id: heax_demo_streamlit
name: Demo · Streamlit Dashboard
version: 0.3.0
owner: heaxhub-demo
status: stable
app_type: web_app
execution_target: linux_runner

description: |
  HEAXHub Streamlit 스택 데모. NumPy 기반 간단 데이터 시각화 대시보드.

tags:
  - demo
  - streamlit
  - dashboard

build:
  stack: streamlit

launch:
  mode: service
  command: >-
    streamlit run app.py
    --server.port=$PORT
    --server.address=0.0.0.0
    --server.headless=true
    --server.baseUrlPath=$ROOT_PATH
    --browser.gatherUsageStats=false

health_check:
  path: /_stcore/health

restart_policy:
  policy: on_failure
  max_retries: 3

resources:
  cpu: 1
  memory_gb: 1
  gpu: false

permissions:
  visibility: team

requirements:
  os: linux
